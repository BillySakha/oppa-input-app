<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tian Shoes - Management System</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="style.css?v=1" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-top">
        <h1>Tian Shoes</h1>
        <span id="item-counter" class="badge">0 Item</span>
      </div>

      <div class="mode-container">
        <button id="modeBtn" class="btn-mode mode-jualan" onclick="toggleMode()">MODE: JUALAN</button>
      </div>

      <div class="search-box">
        <input type="text" id="search-input" placeholder="Cari model sepatu..." oninput="handleSearch()" />
      </div>
    </header>

    <main class="container">
      <div id="product-list" class="list-container"></div>
    </main>

    <footer class="app-footer">
      <button id="btn-submit" class="btn-primary" onclick="kirimLaporan()">Kirim Laporan</button>
    </footer>

    <script src="script.js?v=1"></script>
  </body>
</html>
