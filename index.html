<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="referrer" content="no-referrer" />
    <title>Tian Shoes - Input Order</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-content">
        <h1>Input Order</h1>
        <span id="item-counter" class="badge">0 Item</span>
      </div>

      <div style="padding: 10px; text-align: center">
        <button id="modeBtn" onclick="toggleMode()" class="btn-mode">MODE: JUALAN</button>
      </div>

      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Cari sepatu..." />
      </div>
    </header>

    <main class="container">
      <section id="category-sepatu">
        <h2 class="category-title">Koleksi Produk</h2>
        <div id="product-list" class="product-grid"></div>
      </section>
    </main>

    <footer class="app-footer">
      <button id="btn-submit" class="btn-primary" onclick="kirimLaporan()">Kirim ke Laporan</button>
    </footer>

    <script src="script.js?v=5.1"></script>
  </body>
</html>
